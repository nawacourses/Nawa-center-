<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نوا · مركز القيادة التسويقي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* === Dark palette === */
  --canvas:#0D0F1A;
  --surface:#131625;
  --surface-2:#1A1D2E;
  --surface-3:#20243A;
  --ink:#E8EAFF;
  --ink-soft:#A8AECE;
  --muted:#5A6090;
  --muted-2:#3D4268;
  --line:#1E2240;
  --line-2:#252947;

  /* === Brand — deep violet → electric indigo === */
  --primary:#5B8ED4;
  --primary-deep:#4A7CC0;
  --primary-soft:rgba(74,144,217,.14);
  --primary-glow:0 0 28px rgba(124,92,252,.35);

  /* === Accent palette === */
  --teal:#2DD4BF;
  --teal-soft:rgba(45,212,191,.12);
  --coral:#F97066;
  --coral-soft:rgba(249,112,102,.12);
  --amber:#F5A623;
  --amber-soft:rgba(245,166,35,.12);
  --green:#34D399;
  --green-soft:rgba(52,211,153,.12);
  --red:#F87171;
  --red-soft:rgba(248,113,113,.12);
  --blue:#60A5FA;
  --blue-soft:rgba(96,165,250,.12);
  --purple:#C084FC;
  --purple-soft:rgba(192,132,252,.12);
  --gray:#64748B;
  --gray-soft:rgba(100,116,139,.14);

  /* === Shadows === */
  --shadow-sm:0 1px 3px rgba(0,0,0,.4);
  --shadow:0 4px 20px rgba(0,0,0,.5),0 1px 4px rgba(0,0,0,.3);
  --shadow-lg:0 24px 64px rgba(0,0,0,.7),0 6px 20px rgba(0,0,0,.4);
  --glow-primary:0 0 0 1px rgba(124,92,252,.3),0 8px 32px rgba(124,92,252,.2);

  /* === Geometry === */
  --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:24px;
  --sidebar-w:268px;
  --font:"Cairo","Segoe UI",system-ui,sans-serif;
  --num:"Inter","Cairo",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);color-scheme:dark}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted-2);border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
[data-theme="light"]{
  --canvas:#F4F6FB;--surface:#FFFFFF;--surface-2:#F8F9FD;--surface-3:#EEF0F8;
  --ink:#1A1D35;--ink-soft:#3D4168;--muted:#8A90B4;--muted-2:#C2C6E0;
  --line:#E4E6F4;--line-2:#ECEEF8;
  --primary:#4A7CC0;--primary-deep:#3A6CAF;--primary-soft:rgba(74,144,217,.12);
  --green:#059669;--red:#DC2626;--blue:#2563EB;--amber:#D97706;--coral:#DC4040;--purple:#7C3AED;
  --green-soft:rgba(5,150,105,.1);--red-soft:rgba(220,38,38,.1);--blue-soft:rgba(37,99,235,.1);
  --amber-soft:rgba(217,119,6,.1);--teal-soft:rgba(13,148,136,.1);--purple-soft:rgba(124,58,237,.1);
  --coral-soft:rgba(220,64,64,.1);--gray-soft:rgba(100,116,139,.1);
  --shadow-sm:0 1px 3px rgba(26,29,53,.08);--shadow:0 4px 16px rgba(26,29,53,.1);--shadow-lg:0 20px 50px rgba(26,29,53,.16);
}
[data-theme="light"] .topbar{background:rgba(255,255,255,.9);}
[data-theme="light"] body::before{display:none;}

.num{font-family:var(--num);font-feature-settings:"tnum"}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r-sm);font-weight:700;font-size:13px;background:var(--surface-3);border:1px solid var(--line-2);color:var(--ink-soft);transition:.15s;white-space:nowrap}
.btn:hover{background:var(--surface-2);border-color:var(--muted-2);color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--primary);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(74,144,217,.3)}
.btn-primary:hover{background:var(--primary-deep);border-color:transparent;box-shadow:0 6px 24px rgba(74,144,217,.45)}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--surface-3)}
.btn-danger{color:var(--red);border-color:rgba(248,113,113,.25);background:var(--red-soft)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:var(--r-sm)}
.btn-icon svg{width:16px;height:16px;display:block}

/* ── AUTH ── */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 800px 600px at 70% -5%,rgba(124,92,252,.18) 0%,transparent 60%),
             radial-gradient(ellipse 600px 400px at -5% 100%,rgba(45,212,191,.1) 0%,transparent 55%),
             var(--canvas)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-xl);padding:40px 36px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;inset-block-start:0;inset-inline-start:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--teal));opacity:.8}
.auth-logo{display:flex;align-items:center;gap:13px;margin-bottom:8px}
.auth-mark{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#4A90D9,#7B5EA7);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 24px rgba(124,92,252,.45),0 0 0 1px rgba(124,92,252,.3);flex-shrink:0}
.auth-mark svg{width:24px;height:24px}
.auth-wordmark{display:flex;flex-direction:column;gap:1px}
.auth-wordmark strong{font-size:18px;font-weight:900;letter-spacing:-.3px;color:var(--ink)}
.auth-wordmark span{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.auth-card .sub{color:var(--muted);font-size:13px;margin:6px 0 28px;line-height:1.6}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.3px;text-transform:uppercase}
.input{width:100%;padding:11px 14px;border:1px solid var(--line-2);border-radius:var(--r-sm);background:var(--surface-2);transition:.15s;color:var(--ink)}
.input:focus{outline:none;border-color:var(--primary);background:var(--surface-3);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
textarea.input{resize:vertical;min-height:84px;line-height:1.6}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.auth-switch button{color:var(--primary);font-weight:700}
.auth-switch button:hover{color:#9d7dff}
.auth-err{background:var(--red-soft);color:var(--red);font-size:12.5px;padding:10px 14px;border-radius:var(--r-sm);margin-bottom:14px;font-weight:700;border:1px solid rgba(248,113,113,.2)}

/* ── LAYOUT ── */
#app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-inline-end:1px solid var(--line);
  display:flex;flex-direction:column;position:fixed;inset-block:0;inset-inline-start:0;z-index:40;transition:transform .25s}
.sb-head{padding:20px 16px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.sb-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#4A90D9,#7B5EA7);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(124,92,252,.35)}
.sb-mark svg{width:18px;height:18px}
.sb-brand{display:flex;flex-direction:column;gap:1px}
.sb-brand strong{font-size:14px;font-weight:900;letter-spacing:-.2px;color:var(--ink)}
.sb-brand span{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.sb-search{margin:12px 10px 8px;position:relative}
.sb-search svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted-2)}
.sb-search input{width:100%;padding:9px 36px 9px 11px;border:1px solid var(--line);background:var(--surface-2);border-radius:9px;font-size:12.5px;color:var(--ink)}
.sb-search input:focus{outline:none;border-color:var(--primary);background:var(--surface-3)}
.sb-search input::placeholder{color:var(--muted-2)}
.sb-section{padding:8px 14px 4px;display:flex;align-items:center;justify-content:space-between}
.sb-section span{font-size:10px;font-weight:800;color:var(--muted-2);letter-spacing:.8px;text-transform:uppercase}
.sb-section button{color:var(--muted);padding:3px;border-radius:6px}
.sb-section button:hover{background:var(--surface-3);color:var(--primary)}
.sb-list{flex:1;overflow-y:auto;padding:0 8px 10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:.12s;position:relative}
.sb-item:hover{background:var(--surface-2)}
.sb-item.active{background:var(--primary-soft)}
.sb-item.active .sb-name{color:#c4b5ff;font-weight:700}
.sb-logo{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft)}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sb-home{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;margin:8px 8px 4px;font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer;transition:.12s}
.sb-home:hover{background:var(--surface-2)}
.sb-home.active{background:var(--primary-soft);color:#c4b5ff}
.sb-home svg{width:16px;height:16px}

/* Sidebar footer */
.sb-foot{border-top:1px solid var(--line);padding:10px 10px}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:.15s}
.sb-user:hover{background:var(--surface-2)}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4A90D9,#7B5EA7);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(124,92,252,.3)}
.sb-user-name{flex:1;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft)}
.sb-user-name span{display:block;font-size:10.5px;color:var(--muted);font-weight:400}
.sb-logout-icon{color:var(--muted-2);display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;transition:.12s;flex-shrink:0}
.sb-user:hover .sb-logout-icon{color:var(--coral);background:var(--coral-soft)}
.sb-logout-icon svg{width:15px;height:15px}

/* ── MAIN ── */
.main{flex:1;margin-inline-start:var(--sidebar-w);min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:rgba(19,22,37,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:30}
.hamburger{display:none}
.topbar-title{font-weight:800;font-size:16px;flex:1;letter-spacing:-.2px;display:flex;align-items:center;gap:10px;min-width:0;color:var(--ink)}
.topbar-title .tt-logo{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.topbar-title .tt-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gsearch{position:relative;width:300px;max-width:38vw}
.gsearch svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted-2)}
.gsearch input{width:100%;padding:9px 36px 9px 11px;border:1px solid var(--line);background:var(--surface-2);border-radius:9px;font-size:13px;color:var(--ink)}
.gsearch input:focus{outline:none;border-color:var(--primary);background:var(--surface-3);box-shadow:0 0 0 3px rgba(124,92,252,.12)}
.gsearch input::placeholder{color:var(--muted-2)}
.content{padding:28px;max-width:1320px;width:100%;margin:0 auto;flex:1}

/* ── HOME ── */
.home-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.home-head h2{font-size:26px;font-weight:900;letter-spacing:-.5px;color:var(--ink)}
.home-head p{color:var(--muted);font-size:13px;margin-top:3px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.co-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:0;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.co-card:hover{box-shadow:var(--shadow),0 0 0 1px var(--line-2);transform:translateY(-3px);border-color:var(--line-2)}
.co-spine{height:3px;width:100%}
.co-body{padding:20px}
.co-top{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.co-logo{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;flex-shrink:0}
.co-name{font-weight:800;font-size:15px;letter-spacing:-.2px;line-height:1.3;color:var(--ink)}
.co-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.2px}
.status-pill .d{width:5px;height:5px;border-radius:50%}
.co-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.co-stat{text-align:center}
.co-stat .v{font-family:var(--num);font-weight:700;font-size:18px;color:var(--ink)}
.co-stat .l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.co-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:13px}
.add-co-card{background:transparent;border:2px dashed var(--line-2);border-radius:var(--r-lg);min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--muted);transition:.18s}
.add-co-card:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.add-co-card .plus{width:48px;height:48px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;transition:.15s}
.add-co-card:hover .plus{border-color:var(--primary);background:var(--primary-soft)}
.add-co-card svg{width:22px;height:22px}
.add-co-card span{font-size:13px;font-weight:600}

.tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--surface-3);color:var(--muted);letter-spacing:.2px}

/* ── COMPANY VIEW ── */
.co-header{display:flex;align-items:center;gap:14px;margin-bottom:4px;flex-wrap:wrap}
.co-header .ch-logo{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#fff;flex-shrink:0}
.co-header h2{font-size:22px;font-weight:900;letter-spacing:-.4px;color:var(--ink)}
.co-header .ch-meta{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.co-header .spacer{flex:1}
.tabs-bar{display:flex;align-items:center;gap:2px;margin:20px 0 20px;border-bottom:1px solid var(--line);overflow-x:auto;padding-bottom:0}
.tab-chip{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px 10px 0 0;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.12s;position:relative}
.tab-chip:hover{color:var(--ink-soft);background:var(--surface-2)}
.tab-chip.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--primary-soft)}
.tab-chip svg.ti{width:14px;height:14px;opacity:.85}
.tab-chip .tab-menu-btn{opacity:0;padding:2px;border-radius:5px;margin-inline-start:2px}
.tab-chip:hover .tab-menu-btn,.tab-chip.active .tab-menu-btn{opacity:.5}
.tab-chip .tab-menu-btn:hover{opacity:1;background:var(--surface-3)}
.tab-chip.dragging{opacity:.35}
.tab-chip.drop-target{background:var(--primary-soft)}
.add-tab-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--muted);border-radius:8px;white-space:nowrap;letter-spacing:.2px}
.add-tab-btn:hover{background:var(--primary-soft);color:var(--primary)}
.add-tab-btn svg{width:14px;height:14px}

/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:.15s}
.kpi:hover{border-color:var(--line-2)}
.kpi .kpi-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.kpi .kpi-ico svg{width:18px;height:18px}
.kpi .kpi-v{font-family:var(--num);font-weight:700;font-size:26px;letter-spacing:-.5px;color:var(--ink);line-height:1.1}
.kpi .kpi-l{font-size:11.5px;color:var(--muted);margin-top:4px;font-weight:500}
.kpi .kpi-sub{font-size:11px;font-weight:700;margin-top:8px;display:inline-flex;align-items:center;gap:3px}

.section-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:18px;overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}
.section-head h3{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--ink)}
.section-head h3 svg{width:16px;height:16px;color:var(--muted)}
.section-body{padding:20px}

/* ── TOOLBAR ── */
.tbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tbar .grow{flex:1}
.mini-search{position:relative}
.mini-search svg{position:absolute;inset-inline-start:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted-2)}
.mini-search input{padding:8px 32px 8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:12.5px;width:200px;color:var(--ink)}
.mini-search input:focus{outline:none;border-color:var(--primary);background:var(--surface-3)}
.mini-search input::placeholder{color:var(--muted-2)}
.filter-sel{padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--ink-soft);cursor:pointer}
.filter-sel:focus{outline:none;border-color:var(--primary)}
.filter-sel option{background:var(--surface-3)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface)}
table.dt{width:100%;border-collapse:collapse;font-size:13px;min-width:max-content}
table.dt th{text-align:start;padding:11px 14px;font-size:10.5px;font-weight:800;color:var(--muted);background:var(--surface-2);border-bottom:1px solid var(--line);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
table.dt th.add-field-th{width:42px;text-align:center}
table.dt td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap;max-width:280px;overflow:hidden;text-overflow:ellipsis}
table.dt tr:last-child td{border-bottom:none}
table.dt tbody tr{transition:.1s}
table.dt tbody tr:hover{background:var(--surface-2)}
table.dt tr.archived-row{opacity:.4}
.cell-link{color:var(--primary);font-weight:600;display:inline-flex;align-items:center;gap:4px;font-size:12.5px}
.cell-link:hover{color:#9d7dff}
.cell-link svg{width:12px;height:12px}
.cell-muted{color:var(--muted-2)}
.cell-num{font-family:var(--num);font-weight:600;color:var(--ink-soft)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.2px}
.badge .bd{width:5px;height:5px;border-radius:50%}
.row-actions{display:flex;gap:2px;opacity:0;transition:.1s}
tr:hover .row-actions{opacity:1}
.row-actions button{padding:5px;border-radius:6px;color:var(--muted)}
.row-actions button:hover{background:var(--surface-3);color:var(--ink-soft)}
.row-actions button.del:hover{background:var(--red-soft);color:var(--red)}
.row-actions svg{width:14px;height:14px;display:block}
.add-field-btn{color:var(--muted-2);padding:5px;border-radius:6px}
.add-field-btn:hover{background:var(--primary-soft);color:var(--primary)}
.field-th-menu{cursor:pointer}
.field-th-menu:hover{color:var(--ink-soft)}

/* ── LINKS ── */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.link-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px;display:flex;gap:12px;transition:.15s;position:relative}
.link-card:hover{box-shadow:var(--shadow-sm);border-color:var(--line-2)}
.link-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-ico svg{width:16px;height:16px}
.link-info{flex:1;min-width:0}
.link-title{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.link-url{font-size:11.5px;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:1px}
.link-note{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.link-cat{font-size:10px;font-weight:800;color:var(--muted-2);margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.link-actions{position:absolute;inset-block-start:8px;inset-inline-end:8px;display:flex;gap:2px;opacity:0;transition:.1s}
.link-card:hover .link-actions{opacity:1}
.link-actions button{padding:5px;border-radius:6px;color:var(--muted-2);background:var(--surface-2)}
.link-actions button:hover{background:var(--surface-3);color:var(--ink-soft)}
.link-actions svg{width:13px;height:13px;display:block}

/* ── NOTES ── */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.note-card{border-radius:var(--r);padding:16px;border:1px solid var(--line);position:relative;min-height:120px;transition:.15s}
.note-card:hover{border-color:var(--line-2)}
.note-card .note-title{font-weight:800;font-size:14px;margin-bottom:7px;color:var(--ink)}
.note-card .note-body{font-size:13px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.65}
.note-card .note-date{font-size:10.5px;color:var(--muted-2);margin-top:12px}
.note-actions{position:absolute;inset-block-start:10px;inset-inline-end:10px;display:flex;gap:2px;opacity:0;transition:.1s}
.note-card:hover .note-actions{opacity:1}
.note-actions button{padding:4px;border-radius:6px;color:var(--muted)}
.note-actions button:hover{background:rgba(255,255,255,.06)}
.note-actions svg{width:13px;height:13px;display:block}

/* ── REPORT ── */
.report-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.report-sheet{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:30px;max-width:840px}
.rep-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:24px;gap:14px;flex-wrap:wrap}
.rep-head h2{font-size:20px;font-weight:900;color:var(--ink)}
.rep-head .rep-co{display:flex;align-items:center;gap:12px}
.rep-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:26px}
.rep-kpi{border:1px solid var(--line);border-radius:var(--r);padding:15px;background:var(--surface-2)}
.rep-kpi .v{font-family:var(--num);font-weight:700;font-size:22px;color:var(--ink)}
.rep-kpi .l{font-size:11.5px;color:var(--muted);margin-top:3px}
.rep-section{margin-bottom:24px}
.rep-section h4{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px}
.rep-best{border-inline-start:3px solid var(--green);background:var(--green-soft);padding:13px 15px;border-radius:0 9px 9px 0;margin-bottom:8px}
.rep-worst{border-inline-start:3px solid var(--red);background:var(--red-soft);padding:13px 15px;border-radius:0 9px 9px 0}
.rep-best .t,.rep-worst .t{font-weight:800;font-size:13.5px;color:var(--ink)}
.rep-best .s,.rep-worst .s{font-size:12px;color:var(--ink-soft);margin-top:3px}

/* ── EMPTY (stripped of instructional tone) ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .e-ico{width:64px;height:64px;border-radius:18px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.empty .e-ico svg{width:26px;height:26px;color:var(--primary)}
.empty h3{font-size:16px;font-weight:800;color:var(--ink-soft);margin-bottom:6px}
.empty p{font-size:13px;max-width:300px;margin:0 auto 18px;line-height:1.7;color:var(--muted)}

/* ── PANEL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:60;opacity:0;transition:opacity .2s}
.overlay.show{opacity:1}
.panel{position:fixed;inset-block:0;inset-inline-end:0;width:440px;max-width:94vw;background:var(--surface);z-index:61;box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);border-inline-start:1px solid var(--line)}
html[dir=rtl] .panel{transform:translateX(-100%)}
.panel.show{transform:translateX(0)!important}
.panel-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel-head h3{font-size:16px;font-weight:800;color:var(--ink)}
.panel-body{flex:1;overflow-y:auto;padding:22px 24px}
.panel-foot{padding:15px 24px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;background:var(--surface-2)}
.close-x{padding:7px;border-radius:8px;color:var(--muted)}
.close-x:hover{background:var(--surface-3);color:var(--ink)}
.close-x svg{width:17px;height:17px;display:block}

/* ── MODAL ── */
.modal{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
.modal-card{position:relative;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);width:100%;max-width:440px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:pop .2s}
.modal-card.wide{max-width:560px}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:17px;font-weight:900;color:var(--ink)}
.modal-head p{font-size:12.5px;color:var(--muted);margin-top:3px}
.modal-body{padding:22px 24px;overflow-y:auto}
.modal-foot{padding:15px 24px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;background:var(--surface-2)}

/* ── CHOICE GRID ── */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{border:1.5px solid var(--line-2);border-radius:var(--r);padding:14px;cursor:pointer;transition:.14s;text-align:center}
.choice:hover{border-color:var(--primary);background:var(--primary-soft)}
.choice.sel{border-color:var(--primary);background:var(--primary-soft)}
.choice .c-ico{width:38px;height:38px;border-radius:10px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.choice.sel .c-ico,.choice:hover .c-ico{background:var(--primary-soft)}
.choice .c-ico svg{width:18px;height:18px;color:var(--primary)}
.choice .c-name{font-size:12.5px;font-weight:800;color:var(--ink-soft)}
.choice .c-desc{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4}

/* swatches */
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.1s}
.swatch.sel{border-color:var(--ink);transform:scale(1.12);box-shadow:0 0 0 1px rgba(255,255,255,.15)}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap}
.emoji-pick{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;background:var(--surface-3);transition:.12s}
.emoji-pick.sel,.emoji-pick:hover{border-color:var(--primary);background:var(--primary-soft)}

/* tags input */
.tags-input{display:flex;flex-wrap:wrap;gap:6px;border:1px solid var(--line-2);border-radius:8px;padding:7px 10px;background:var(--surface-2);min-height:40px;align-items:center}
.tags-input input{border:none;background:transparent;flex:1;min-width:80px;font-size:13px;outline:none;color:var(--ink)}
.tags-input input::placeholder{color:var(--muted-2)}
.tag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--primary-soft);color:#c4b5ff;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:6px}
.tag-chip button{color:#c4b5ff;opacity:.6;display:flex}
.tag-chip button:hover{opacity:1}
.tag-chip svg{width:11px;height:11px}

/* dropdown menu */
.menu{position:fixed;z-index:80;background:var(--surface-2);border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-lg);padding:5px;min-width:190px;animation:pop .12s}
.menu button{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-soft);text-align:start;transition:.1s}
.menu button:hover{background:var(--surface-3);color:var(--ink)}
.menu button.danger{color:var(--red)}
.menu button.danger:hover{background:var(--red-soft)}
.menu button svg{width:14px;height:14px;flex-shrink:0;color:var(--muted)}
.menu button.danger svg{color:var(--red)}
.menu .sep{height:1px;background:var(--line);margin:4px 4px}

/* FAB */
#fab{position:fixed;inset-block-end:28px;inset-inline-end:28px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary-deep),var(--primary));color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(74,144,217,.5),0 2px 8px rgba(0,0,0,.3);z-index:50;transition:.18s}
#fab:hover{transform:scale(1.07);box-shadow:0 12px 36px rgba(74,144,217,.6)}
#fab svg{width:22px;height:22px}

/* toast */
#toast-root{position:fixed;inset-block-end:28px;inset-inline-start:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
html[dir=rtl] #toast-root{transform:translateX(50%)}
.toast{background:var(--surface-3);color:var(--ink);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;animation:toastin .25s;border:1px solid var(--line-2)}
.toast svg{width:16px;height:16px;color:var(--green)}
@keyframes toastin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* global search */
.gsr{padding:6px;position:absolute;top:calc(100% + 8px);inset-inline-start:0;width:min(420px,92vw);max-height:60vh;overflow-y:auto;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:60}
.gsr-group-h{font-size:10px;font-weight:800;color:var(--muted-2);text-transform:uppercase;letter-spacing:.6px;padding:10px 12px 5px}
.gsr-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:.1s}
.gsr-item:hover{background:var(--surface-3)}
.gsr-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;color:#fff;font-size:12px}
.gsr-main{flex:1;min-width:0}
.gsr-t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.gsr-s{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider-lbl{font-size:10px;font-weight:800;color:var(--muted-2);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 10px;border-top:1px solid var(--line);padding-top:14px}

/* print */
#print-area{display:none}
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{display:block;position:absolute;inset:0;padding:0;background:#fff}
  @page{margin:14mm}
}

/* responsive */
@media(max-width:880px){
  .sidebar{transform:translateX(100%)}
  html[dir=rtl] .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)!important}
  .main{margin-inline-start:0}
  .hamburger{display:flex}
  .gsearch{width:auto;flex:1}
  .content{padding:16px}
  .form-row{grid-template-columns:1fr}
  .choice-grid{grid-template-columns:1fr}
}
.sb-backdrop{display:none}
@media(max-width:880px){.sb-backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39}}
.hide{display:none!important}

/* Subtle grid texture on canvas */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(124,92,252,.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
#app-shell,#auth{position:relative;z-index:1}
</style>
</head>

function timeAgo(ts){if(!ts)return'';const s=(Date.now()-ts)/1000;if(s<60)return'الآن';if(s<3600)return`${Math.floor(s/60)} د`;if(s<86400)return`${Math.floor(s/3600)} س`;const d=Math.floor(s/86400);if(d<30)return`${d} يوم`;return fmtDate(ts);}

function openMenu(x,y,items){closeMenu();const m=document.createElement('div');m.className='menu';m.style.visibility='hidden';
 m.innerHTML=items.map(it=>it.sep?'<div class="sep"></div>':`<button class="${it.danger?'danger':''}" data-k="${it.k}">${svg(it.icon)}<span>${esc(it.label)}</span></button>`).join('');
 $('#menu-root').appendChild(m);
 const r=m.getBoundingClientRect();let px=x,py=y;
 if(px+r.width>innerWidth-8)px=innerWidth-r.width-8;if(px<8)px=8;
 if(py+r.height>innerHeight-8)py=Math.max(8,y-r.height);
 m.style.left=px+'px';m.style.top=py+'px';m.style.visibility='visible';
 m.querySelectorAll('button').forEach(b=>b.onclick=()=>{const it=items.find(i=>i.k===b.dataset.k);closeMenu();if(it&&it.onClick)it.onClick();});
 setTimeout(()=>document.addEventListener('mousedown',menuOutside),0);
}
function menuOutside(e){if(!e.target.closest('.menu'))closeMenu();}
function closeMenu(){$('#menu-root').innerHTML='';document.removeEventListener('mousedown',menuOutside);}

let panelState=null;
function panel({title,build,footer}){closePanel();
 const ov=document.createElement('div');ov.className='overlay';
 const p=document.createElement('div');p.className='panel';
 p.innerHTML=`<div class="panel-head"><h3>${esc(title)}</h3><button class="close-x" data-close>${svg('x')}</button></div><div class="panel-body"></div><div class="panel-foot"></div>`;
 const root=$('#panel-root');root.appendChild(ov);root.appendChild(p);
 const body=$('.panel-body',p);if(build)build(body);
 const foot=$('.panel-foot',p);(footer||[]).forEach(f=>{const b=document.createElement('button');b.className='btn '+(f.primary?'btn-primary':f.danger?'btn-danger':'');b.textContent=f.label;b.onclick=()=>f.onClick&&f.onClick(body);foot.appendChild(b);});
 $('[data-close]',p).onclick=closePanel;ov.onclick=closePanel;
 panelState={ov,p};
 requestAnimationFrame(()=>{ov.classList.add('show');p.classList.add('show');});
 return body;
}
function closePanel(){if(!panelState)return;const{ov,p}=panelState;ov.classList.remove('show');p.classList.remove('show');setTimeout(()=>{ov.remove();p.remove();},260);panelState=null;}

function fieldRow(labelHTML,controlEl){const w=document.createElement('div');w.className='field';if(labelHTML)w.innerHTML=`<label>${labelHTML}</label>`;w.appendChild(controlEl);return w;}
function makeInput(field,value){
 let ctrl,get;const t=field.type;
 if(t==='longtext'){ctrl=document.createElement('textarea');ctrl.className='input';ctrl.value=value||'';get=()=>ctrl.value.trim();}
 else if(t==='number'){ctrl=document.createElement('input');ctrl.className='input';ctrl.type='number';ctrl.value=(value??'')===''?'':value;get=()=>ctrl.value===''?'':Number(ctrl.value);}
 else if(t==='date'){ctrl=document.createElement('input');ctrl.className='input';ctrl.type='date';ctrl.value=value||'';get=()=>ctrl.value;}
 else if(t==='dropdown'||t==='status'){ctrl=document.createElement('select');ctrl.className='input';ctrl.innerHTML='<option value="">— اختار —</option>'+(field.options||[]).map(o=>`<option ${o===value?'selected':''}>${esc(o)}</option>`).join('');get=()=>ctrl.value;}
 else if(t==='tags'){const box=document.createElement('div');box.className='tags-input';let tags=Array.isArray(value)?value.slice():(value?String(value).split(',').map(s=>s.trim()).filter(Boolean):[]);
   const inp=document.createElement('input');inp.placeholder='أضف تاغ + Enter';
   function draw(){box.querySelectorAll('.tag-chip').forEach(e=>e.remove());tags.forEach((tg,i)=>{const c=document.createElement('span');c.className='tag-chip';c.innerHTML=`${esc(tg)}<button type="button">${svg('x')}</button>`;c.querySelector('button').onclick=()=>{tags.splice(i,1);draw();};box.insertBefore(c,inp);});}
   inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();const v=inp.value.trim();if(v&&!tags.includes(v)){tags.push(v);inp.value='';draw();}}else if(e.key==='Backspace'&&!inp.value&&tags.length){tags.pop();draw();}};
   box.appendChild(inp);draw();ctrl=box;get=()=>tags.slice();}
 else{ctrl=document.createElement('input');ctrl.className='input';ctrl.type=t==='link'?'url':'text';ctrl.value=value||'';if(t==='link')ctrl.placeholder='https://';get=()=>ctrl.value.trim();}
 const w=fieldRow(esc(field.name),ctrl);w.__get=get;return w;
}

function cellHTML(field,value,first){
 const t=field.type;
 if(value==null||value===''||(Array.isArray(value)&&!value.length))return '<span class="cell-muted">—</span>';
 if(t==='status'){const c=optColor(value);return `<span class="badge" style="background:${c.bg};color:${c.fg}"><span class="bd" style="background:${c.dot}"></span>${esc(value)}</span>`;}
 if(t==='dropdown'){return `<span class="badge" style="background:var(--surface-3);color:var(--ink-soft)">${esc(value)}</span>`;}
 if(t==='link'){let u=String(value);if(!/^https?:/i.test(u))u='https://'+u;return `<a class="cell-link" href="${esc(u)}" target="_blank" rel="noopener">${svg('ext')}فتح</a>`;}
 if(t==='number'){return `<span class="cell-num">${fmtNum(value)}</span>`;}
 if(t==='date'){return `<span class="cell-num" style="color:var(--muted)">${fmtDate(value)}</span>`;}
 if(t==='tags'){const arr=Array.isArray(value)?value:String(value).split(',');return arr.filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join(' ');}
 const txt=esc(value);return first?`<strong style="color:var(--ink)">${txt}</strong>`:txt;
}

function campaignTab(c){return c.tabs.find(t=>t.type==='table'&&t.fields.some(f=>f.id==='budget')&&t.fields.some(f=>f.id==='leads'));}
function leadTab(c){return c.tabs.find(t=>t.type==='table'&&t.fields.some(f=>f.id==='source')&&t.fields.some(f=>f.id==='status'));}
function num(v){const n=Number(v);return isNaN(n)?0:n;}
function coStats(c){
 const ct=campaignTab(c),lt=leadTab(c);
 const camps=ct?ct.rows.filter(r=>!r.archived):[];
 const active=camps.filter(r=>r.values.status==='نشطة').length;
 const budget=camps.reduce((s,r)=>s+num(r.values.budget),0);
 const campLeads=camps.reduce((s,r)=>s+num(r.values.leads),0);
 const sales=camps.reduce((s,r)=>s+num(r.values.sales),0);
 const crmLeads=lt?lt.rows.filter(r=>!r.archived).length:0;
 const leads=Math.max(campLeads,crmLeads);
 const cpl=campLeads>0?Math.round(budget/campLeads):0;
 return{active,budget,leads:campLeads,crmLeads,sales,cpl,totalLeads:leads};
}

/* ===== BOOT ===== */
function hashPass(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return 'h'+h.toString(36);}
function initials(n){return String(n||'؟').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}

async function boot(){
 let raw=await Storage.get(KEY);let db=null;
 if(raw){try{db=JSON.parse(raw);}catch(e){db=null;}}
 if(!db||!db.companies){db=seedDB();await Storage.set(KEY,JSON.stringify(db));}
 if(!db.users)db.users=[];if(!db.templates)db.templates=[];if(db.session===undefined)db.session=null;
 DB=db;
 if(db.session&&db.users.some(u=>u.email===db.session))renderApp();
 else renderAuth();
}

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/2Q==" alt="نوا" style="width:46px;height:46px;object-fit:contain;border-radius:10px;flex-shrink:0">

   </div>
   <p class="sub">${isLogin?'سجّلي دخولك وتابعي كل حملات نوا':'أنشئي حسابك وابدئي إدارة البرامج'}</p>
   <div id="authErr"></div>
   ${isLogin?'':`<div class="field"><label>الاسم</label><input class="input" id="auName" placeholder="كارما"></div>`}

   <div class="auth-switch">${isLogin?'مفيش حساب؟':'عندك حساب؟'} <button id="auSwitch">${isLogin?'اعملي حساب':'سجّلي دخول'}</button></div>
 </div>`;
 $('#auSwitch').onclick=()=>{authMode=isLogin?'signup':'login';renderAuth();};
 const submit=()=>isLogin?doLogin():doSignup();
 $('#auSubmit').onclick=submit;
 a.querySelectorAll('.input').forEach(inp=>inp.onkeydown=e=>{if(e.key==='Enter')submit();});
 (a.querySelector('#auName')||a.querySelector('#auEmail')).focus();
}
function authErr(m){$('#authErr').innerHTML=`<div class="auth-err">${esc(m)}</div>`;}
function doSignup(){
 const name=$('#auName').value.trim(),email=$('#auEmail').value.trim().toLowerCase(),pass=$('#auPass').value;
 if(!name)return authErr('اكتبي اسمك');
 if(!/^\S+@\S+\.\S+$/.test(email))return authErr('الإيميل مش مظبوط');
 if(pass.length<4)return authErr('الباسورد لازم ٤ حروف على الأقل');
 if(DB.users.some(u=>u.email===email))return authErr('الإيميل ده مسجّل قبل كده');
 DB.users.push({name,email,pass:hashPass(pass),createdAt:Date.now()});
 DB.session=email;persistNow();toast('أهلاً بيكي '+name.split(' ')[0]+' 👋');renderApp();
}
function doLogin(){
 const email=$('#auEmail').value.trim().toLowerCase(),pass=$('#auPass').value;
 const u=DB.users.find(x=>x.email===email);
 if(!u)return authErr('مفيش حساب بالإيميل ده');
 if(u.pass!==hashPass(pass))return authErr('الباسورد غلط');
 DB.session=email;persistNow();toast('نوّرتي 👋');renderApp();
}
function logout(){DB.session=null;persistNow();App.view='home';App.companyId=null;App.tabId=null;renderAuth();}

/* ===== APP SHELL ===== */
function renderApp(){
 $('#auth').style.display='none';$('#auth').innerHTML='';
 const app=$('#app-shell');app.classList.remove('hide');$('#fab').classList.remove('hide');
 app.innerHTML=`
  <aside class="sidebar" id="sidebar">
   <div class="sb-head">
     <div class="sb-mark">${svg('bolt')}</div>
     <div class="sb-brand"><strong>نوا للتدريب الصحي</strong><span>مركز القيادة التسويقي</span></div>
   </div>
   <div class="sb-search">${svg('search')}<input id="sbSearch" placeholder="بحث في البرامج..." value="${esc(App.sbSearch)}"></div>
   <div class="sb-home ${App.view==='home'?'active':''}" id="sbHome">${svg('home')}<span>الرئيسية</span></div>
   <div class="sb-section"><span>البرامج</span><button id="sbAdd" title="برنامج جديد">${svg('plus')}</button></div>
   <div class="sb-list" id="sbList"></div>
   <div class="sb-foot">
     <div class="sb-user" id="sbUser">
       <div class="sb-avatar">${esc(initials((curUser()||{}).name))}</div>
       <div class="sb-user-name">${esc((curUser()||{}).name||'مستخدم')}<span>${esc((curUser()||{}).email||'')}</span></div>
       <div class="sb-logout-icon" title="تسجيل خروج">${svg('logout')}</div>
     </div>
   </div>
  </aside>
  <div class="main">
   <div class="topbar">
     <button class="hamburger btn-icon" id="ham">${svg('list')}</button>
     <div class="topbar-title" id="tbTitle"></div>
     <div class="gsearch">${svg('search')}<input id="gSearch" placeholder="بحث في كل البرامج..."></div>
   </div>
   <div class="content" id="content"></div>
  </div>`;
 renderSbList();
 $('#sbSearch').oninput=e=>{App.sbSearch=e.target.value;renderSbList();};
 $('#sbHome').onclick=()=>{App.view='home';App.companyId=null;closeSidebar();render();};
 $('#sbAdd').onclick=addCompanyModal;
 $('#sbUser').onclick=()=>{const r=$('#sbUser').getBoundingClientRect();openMenu(r.left,r.top-8,[
   {k:'out',icon:'logout',label:'تسجيل خروج',danger:true,onClick:logout}]);};
 $('#ham').onclick=()=>{const s=$('#sidebar');const open=s.classList.toggle('open');$('#sbBackdrop').classList.toggle('show',open);};
 $('#sbBackdrop').onclick=closeSidebar;
 const gs=$('#gSearch');gs.oninput=debounce(()=>globalSearch(gs.value),140);
 gs.onfocus=()=>{if(gs.value)globalSearch(gs.value);};
 const fab=$('#fab');fab.innerHTML=svg('plus');fab.onclick=quickAddMenu;
 render();
}
function closeSidebar(){const s=$('#sidebar');if(s)s.classList.remove('open');const bd=$('#sbBackdrop');if(bd)bd.classList.remove('show');}

function renderSbList(){
 const list=$('#sbList');if(!list)return;
 const q=App.sbSearch.trim().toLowerCase();
 const cos=DB.companies.filter(c=>!c.archived&&(!q||c.name.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q))));
 if(!cos.length){list.innerHTML=`<div style="padding:16px 14px;font-size:12px;color:var(--muted-2)">${q?'مفيش نتائج':'أضيفي برنامجك الأول'}</div>`;return;}
 list.innerHTML=cos.map(c=>`<div class="sb-item ${App.view==='company'&&App.companyId===c.id?'active':''}" data-id="${c.id}">
   <div class="sb-logo" style="background:${c.color}">${/\p{Emoji}/u.test(c.logo)?c.logo:esc(initials(c.name))}</div>
   <div class="sb-name">${esc(c.name)}</div>
   <span class="sb-dot" style="background:${(SPILL[c.status]||optColor(c.status)).dot}"></span>
 </div>`).join('');
 list.querySelectorAll('.sb-item').forEach(el=>el.onclick=()=>{openCompany(el.dataset.id);closeSidebar();});
}

function openCompany(id){const c=company(id);if(!c)return;App.view='company';App.companyId=id;
 if(!c.tabs.find(t=>t.id===App.tabId))App.tabId=c.tabs[0]&&c.tabs[0].id;render();}

/* ===== ROUTER ===== */
function render(){
 renderSbList();
 const tt=$('#tbTitle');
 if(App.view==='company'){const c=curCo();
   tt.innerHTML=c?`<div class="tt-logo" style="background:${c.color}">${/\p{Emoji}/u.test(c.logo)?c.logo:esc(initials(c.name))}</div><span class="tt-text">${esc(c.name)}</span>`:'';
 }else tt.innerHTML=`<span class="tt-text" style="color:var(--muted)">مركز القيادة التسويقي</span>`;
 const content=$('#content');content.scrollTop=0;
 if(App.view==='company'&&curCo())renderCompany(content);
 else renderHome(content);
}

/* ===== HOME ===== */
function renderHome(root){
 const cos=DB.companies.filter(c=>!c.archived);
 const head=`<div class="home-head"><div><h2>برامج نوا للتدريب الصحي</h2><p>${cos.length} برنامج · كل الحملات والداتا في مكان واحد</p></div>
   <button class="btn btn-primary" id="homeAdd">${svg('plus')}برنامج جديد</button></div>`;
 if(!cos.length){
   root.innerHTML=head+`<div class="empty"><div class="e-ico">${svg('grid')}</div><h3>ابدئي بأول برنامج</h3><p>كل برنامج له Dashboard مخصص مع حملات، محتوى، ليدز، ومهام.</p><button class="btn btn-primary" id="emptyAdd">${svg('plus')}إضافة برنامج</button></div>`;
   $('#homeAdd').onclick=addCompanyModal;$('#emptyAdd').onclick=addCompanyModal;return;
 }

function renderTable(root,c,t){
 const u=tabUI(t.id);
 root.innerHTML=`<div class="tbar">

 </div><div class="tbl-wrap" id="tblWrap"></div>`;
 const stf=t.fields.find(f=>f.type==='status');const sel=$('#tFilter');
 if(stf){(stf.options||[]).forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(u.filter===o)op.selected=true;sel.appendChild(op);});}
 else sel.style.display='none';
 $('#tSearch').oninput=e=>{u.search=e.target.value;renderRows(c,t);};

function filteredRows(t,u){
 let rows=t.rows.slice();
 if(!u.showArch)rows=rows.filter(r=>!r.archived);
 if(u.filter){const sf=t.fields.find(f=>f.type==='status');if(sf)rows=rows.filter(r=>r.values[sf.id]===u.filter);}
 if(u.search){const q=u.search.toLowerCase();rows=rows.filter(r=>t.fields.some(f=>{const v=r.values[f.id];return v!=null&&String(Array.isArray(v)?v.join(' '):v).toLowerCase().includes(q);}));}
 return rows;
}
function renderRows(c,t){
 const u=tabUI(t.id);const wrap=$('#tblWrap');if(!wrap)return;

 if(!t.rows.length){
   wrap.outerHTML=`<div class="tbl-wrap" id="tblWrap"><div class="empty"><div class="e-ico">${svg(t.icon||'list')}</div>

   `<th class="add-field-th"><button class="add-field-btn" id="addField" title="عمود جديد">${svg('plus')}</button></th>`;
 const body=rows.map(r=>{const cells=t.fields.map((f,i)=>`<td>${cellHTML(f,r.values[f.id],i===0)}</td>`).join('');
   return `<tr class="${r.archived?'archived-row':''}" data-row="${r.id}">${cells}<td><div class="row-actions">
     <button data-act="edit">${svg('edit')}</button>

 wrap.innerHTML=`<table class="dt"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
 if(!rows.length)wrap.innerHTML+=`<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">مفيش نتائج</div>`;
 $('#addField').onclick=()=>addFieldModal(c,t);
 wrap.querySelectorAll('.field-th-menu').forEach(th=>th.onclick=e=>fieldMenu(e,c,t,th.dataset.field));
 wrap.querySelectorAll('tr[data-row]').forEach(tr=>{
   const r=t.rows.find(x=>x.id===tr.dataset.row);
   tr.querySelectorAll('[data-act]').forEach(btn=>btn.onclick=e=>{e.stopPropagation();const a=btn.dataset.act;
     if(a==='edit')rowPanel(c,t,r);
     else if(a==='dup'){const copy=newRow(JSON.parse(JSON.stringify(r.values)));const i=t.rows.indexOf(r);t.rows.splice(i+1,0,copy);touch(c);save();toast('اتعمل تكرار');renderRows(c,t);}
     else if(a==='arch'){r.archived=!r.archived;r.updatedAt=Date.now();touch(c);save();renderRows(c,t);}
     else if(a==='del')confirmDelete('حذف الصف','',()=>{t.rows=t.rows.filter(x=>x.id!==r.id);touch(c);save();renderRows(c,t);});
   });
   tr.querySelectorAll('td').forEach((td,i)=>{if(i<t.fields.length)td.onclick=()=>rowPanel(c,t,r);});
 });

function rowPanel(c,t,row){

 panel({title:editing?'تعديل':'إضافة جديدة',build(body){
   t.fields.forEach(f=>{const w=makeInput(f,vals[f.id]);getters[f.id]=w.__get;body.appendChild(w);});
   setTimeout(()=>{const fi=body.querySelector('input,select,textarea');if(fi)fi.focus();},40);
 },footer:[{label:'إلغاء',onClick:closePanel},{label:editing?'حفظ':'إضافة',primary:true,onClick:()=>{
   const nv={};t.fields.forEach(f=>nv[f.id]=getters[f.id]());
   if(t.fields.some(f=>f.id==='cpl')&&t.fields.some(f=>f.id==='budget')){const b=num(nv.budget),l=num(nv.leads);if(b&&l&&!num(nv.cpl))nv.cpl=Math.round(b/l);}
   if(editing){row.values=nv;row.updatedAt=Date.now();}else{t.rows.unshift(newRow(nv));}
   touch(c);save();closePanel();toast(editing?'اتحفظ':'اتضاف ✅');renderRows(c,t);
 }}]});

function fieldMenu(e,c,t,fid){const f=t.fields.find(x=>x.id===fid);const r=e.currentTarget.getBoundingClientRect();

   {k:'ren',icon:'edit',label:'إعادة تسمية',onClick:()=>{modal({title:'اسم العمود',build(b){b.innerHTML='';const w=makeInput({type:'text',name:'الاسم'},f.name);b.appendChild(w);b.__w=w;setTimeout(()=>w.querySelector('input').focus(),30);},footer:[{label:'إلغاء',onClick:closeModal},{label:'حفظ',primary:true,onClick:(b)=>{const v=b.__w.__get();if(v){f.name=v;touch(c);save();renderRows(c,t);}closeModal();}}]});}},

function importCsv(c,t){
 const inp=document.createElement('input');inp.type='file';inp.accept='.csv,text/csv';
 inp.onchange=()=>{const file=inp.files[0];if(!file)return;const rd=new FileReader();
   rd.onload=()=>{try{const rows=parseCSV(rd.result);if(rows.length<2)return toast('الملف فاضي',false);
     const headers=rows[0].map(h=>h.trim());
     const map=headers.map(h=>{let f=t.fields.find(ff=>ff.name.trim()===h||ff.id===h);if(!f){f={id:uid(),name:h,type:'text'};t.fields.push(f);}return f;});
     let added=0;rows.slice(1).forEach(r=>{if(!r.length||r.every(x=>!String(x).trim()))return;const v={};map.forEach((f,i)=>{let cell=(r[i]||'').trim();if(!cell)return;if(f.type==='number')cell=num(cell);if(f.type==='tags')cell=cell.split(/[،,]/).map(s=>s.trim()).filter(Boolean);v[f.id]=cell;});t.rows.unshift(newRow(v));added++;});
     touch(c);save();toast(`اتضاف ${added} صف ✅`);renderRows(c,t);
   }catch(err){toast('مش قادرة أقرأ الملف',false);}};
   rd.readAsText(file,'utf-8');};inp.click();}
function parseCSV(txt){const rows=[];let i=0,field='',row=[],q=false;txt=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
 while(i<txt.length){const ch=txt[i];
   if(q){if(ch==='"'){if(txt[i+1]==='"'){field+='"';i+=2;continue;}q=false;i++;continue;}field+=ch;i++;continue;}
   if(ch==='"'){q=true;i++;continue;}if(ch===','){row.push(field);field='';i++;continue;}
   if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
   field+=ch;i++;}
 if(field.length||row.length){row.push(field);rows.push(row);}return rows;}

function computeReport(c,monthLabel){
 const ct=campaignTab(c);const camps=ct?ct.rows.filter(r=>!r.archived):[];
 const budget=camps.reduce((s,r)=>s+num(r.values.budget),0);
 const leads=camps.reduce((s,r)=>s+num(r.values.leads),0);
 const sales=camps.reduce((s,r)=>s+num(r.values.sales),0);
 const cpl=leads?Math.round(budget/leads):0;
 const withCpl=camps.map(r=>({name:r.values.name||'حملة',cpl:num(r.values.cpl)||(num(r.values.leads)?Math.round(num(r.values.budget)/num(r.values.leads)):0),leads:num(r.values.leads),budget:num(r.values.budget),platform:r.values.platform})).filter(x=>x.leads>0);
 let best=null,worst=null;
 if(withCpl.length){best=withCpl.reduce((a,b)=>a.cpl<=b.cpl?a:b);worst=withCpl.reduce((a,b)=>a.cpl>=b.cpl?a:b);}
 return{id:uid(),month:monthLabel,createdAt:Date.now(),budget,leads,sales,cpl,campaigns:camps.length,
   best:best?{name:best.name,cpl:best.cpl,leads:best.leads,platform:best.platform}:null,
   worst:worst&&withCpl.length>1?{name:worst.name,cpl:worst.cpl,leads:worst.leads,platform:worst.platform}:null,
   recommendations:''};
}

   b.innerHTML=`<div class="choice-grid" id="secTypes">${SECTION_TYPES.map((s,i)=>`<div class="choice ${i===0?'sel':''}" data-t="${s.t}"><div class="c-ico">${svg(s.icon)}</div><div class="c-name">${s.n}</div><div class="c-desc">${s.d}</div></div>`).join('')}</div>
     <div class="field" style="margin-top:16px"><label>اسم السيكشن</label><input class="input" id="secName" placeholder="مثلاً: حملات سناب، مهام التصميم..."></div>`;
   b.querySelectorAll('#secTypes .choice').forEach(ch=>ch.onclick=()=>{b.querySelectorAll('#secTypes .choice').forEach(x=>x.classList.remove('sel'));ch.classList.add('sel');chosen=ch.dataset.t;});
   setTimeout(()=>b.querySelector('#secName').focus(),30);
 },footer:[{label:'إلغاء',onClick:closeModal},{label:'إضافة',primary:true,onClick:(b)=>{
   const def=SECTION_TYPES.find(s=>s.t===chosen);const name=b.querySelector('#secName').value.trim()||def.n;
   const tab=def.make(name);c.tabs.push(tab);touch(c);save();closeModal();App.tabId=tab.id;toast('اتضاف ✅');render();
 }}]});
}

/* ===== ADD / EDIT COMPANY ===== */
function addCompanyModal(){
 let emoji=EMOJIS[0],color=COMPANY_COLORS[0],struct='full';

     <div class="field"><label>أيقونة</label><div class="emoji-row" id="ccEmoji">${EMOJIS.slice(0,14).map((e,i)=>`<div class="emoji-pick ${i===0?'sel':''}" data-e="${e}">${e}</div>`).join('')}</div></div>
     <div class="field"><label>اللون</label><div class="swatches" id="ccColor">${COMPANY_COLORS.map((c,i)=>`<div class="swatch ${i===0?'sel':''}" data-c="${c}" style="background:${c}"></div>`).join('')}</div></div>

     <div class="divider-lbl">الهيكل المبدئي</div>
     <div class="choice-grid" id="ccStruct">
       <div class="choice sel" data-s="full"><div class="c-ico">${svg('grid')}</div><div class="c-name">كامل</div><div class="c-desc">٧ تابات جاهزة</div></div>
       <div class="choice" data-s="blank"><div class="c-ico">${svg('file')}</div><div class="c-name">من الصفر</div><div class="c-desc">Dashboard فقط</div></div>
       ${templates.map(tp=>`<div class="choice" data-s="tpl:${tp.id}"><div class="c-ico">${svg('layers')}</div><div class="c-name">${esc(tp.name)}</div><div class="c-desc">Template محفوظ</div></div>`).join('')}
     </div>`;
   const tagHost=b.querySelector('#ccTagsHost');const tagW=makeInput({type:'tags',name:''},[]);tagHost.appendChild(tagW.querySelector('.tags-input'));b.__tags=tagW.__get;
   b.querySelectorAll('#ccEmoji .emoji-pick').forEach(el=>el.onclick=()=>{b.querySelectorAll('#ccEmoji .emoji-pick').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');emoji=el.dataset.e;});
   b.querySelectorAll('#ccColor .swatch').forEach(el=>el.onclick=()=>{b.querySelectorAll('#ccColor .swatch').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');color=el.dataset.c;});
   b.querySelectorAll('#ccStruct .choice').forEach(el=>el.onclick=()=>{b.querySelectorAll('#ccStruct .choice').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');struct=el.dataset.s;});
   setTimeout(()=>b.querySelector('#ccName').focus(),30);
 },footer:[{label:'إلغاء',onClick:closeModal},{label:'إنشاء البرنامج',primary:true,onClick:(b)=>{
   const name=b.querySelector('#ccName').value.trim();if(!name)return toast('اكتبي اسم البرنامج',false);
   const status=b.querySelector('#ccStatus').value;const tags=b.__tags()||[];
   let tabs;if(struct==='full')tabs=defaultTabs();else if(struct==='blank')tabs=blankTabs();
   else if(struct.startsWith('tpl:')){const tp=(DB.templates||[]).find(x=>x.id===struct.slice(4));tabs=tp?JSON.parse(JSON.stringify(tp.tabs)):defaultTabs();tabs.forEach(t=>t.id=uid());}
   else tabs=defaultTabs();
   const co={id:uid(),name,logo:emoji,color,status,archived:false,tags,createdAt:Date.now(),updatedAt:Date.now(),tabs};
   DB.companies.push(co);save();closeModal();toast('اتعمل البرنامج ✅');openCompany(co.id);
 }}]});

function editCompanyModal(c){let emoji=c.logo,color=c.color;
 modal({title:'تعديل البرنامج',build(b){
   b.innerHTML=`<div class="form-row"><div class="field"><label>الاسم</label><input class="input" id="ecName" value="${esc(c.name)}"></div>
     <div class="field"><label>الحالة</label><select class="input" id="ecStatus">${COMPANY_STATUSES.map(s=>`<option ${s===c.status?'selected':''}>${s}</option>`).join('')}</select></div></div>
     <div class="field"><label>أيقونة</label><div class="emoji-row" id="ecEmoji">${EMOJIS.slice(0,14).map(e=>`<div class="emoji-pick ${e===c.logo?'sel':''}" data-e="${e}">${e}</div>`).join('')}</div></div>
     <div class="field"><label>اللون</label><div class="swatches" id="ecColor">${COMPANY_COLORS.map(cc=>`<div class="swatch ${cc===c.color?'sel':''}" data-c="${cc}" style="background:${cc}"></div>`).join('')}</div></div>
     <div class="field"><label>تاغات</label><div id="ecTagsHost"></div></div>`;
   const tagW=makeInput({type:'tags',name:''},c.tags||[]);b.querySelector('#ecTagsHost').appendChild(tagW.querySelector('.tags-input'));b.__tags=tagW.__get;
   b.querySelectorAll('#ecEmoji .emoji-pick').forEach(el=>el.onclick=()=>{b.querySelectorAll('#ecEmoji .emoji-pick').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');emoji=el.dataset.e;});
   b.querySelectorAll('#ecColor .swatch').forEach(el=>el.onclick=()=>{b.querySelectorAll('#ecColor .swatch').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');color=el.dataset.c;});
 },footer:[{label:'إلغاء',onClick:closeModal},{label:'حفظ',primary:true,onClick:(b)=>{
   c.name=b.querySelector('#ecName').value.trim()||c.name;c.status=b.querySelector('#ecStatus').value;c.logo=emoji;c.color=color;c.tags=b.__tags();
   touch(c);save();closeModal();toast('اتحفظ ✅');render();
 }}]});

/* ===== TAB DND ===== */
function wireTabDnD(bar,c){
 let dragId=null;
 bar.querySelectorAll('.tab-chip').forEach(chip=>{
   chip.addEventListener('dragstart',e=>{dragId=chip.dataset.tab;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
   chip.addEventListener('dragend',()=>{dragId=null;chip.classList.remove('dragging');bar.querySelectorAll('.tab-chip').forEach(x=>x.classList.remove('drop-target'));});
   chip.addEventListener('dragover',e=>{e.preventDefault();if(chip.dataset.tab!==dragId)chip.classList.add('drop-target');});
   chip.addEventListener('dragleave',()=>chip.classList.remove('drop-target'));
   chip.addEventListener('drop',e=>{e.preventDefault();chip.classList.remove('drop-target');
     if(!dragId||dragId===chip.dataset.tab)return;
     const from=c.tabs.findIndex(t=>t.id===dragId),to=c.tabs.findIndex(t=>t.id===chip.dataset.tab);
     const[m]=c.tabs.splice(from,1);c.tabs.splice(to,0,m);touch(c);save();render();});
 });
}

/* ===== QUICK ADD ===== */
function quickAddMenu(){
 const r=$('#fab').getBoundingClientRect();
 openMenu(r.left,r.top-8,[
   {k:'camp',icon:'mega',label:'حملة',onClick:()=>quickAdd('campaign')},
   {k:'task',icon:'check',label:'مهمة',onClick:()=>quickAdd('task')},
   {k:'lead',icon:'users',label:'ليد',onClick:()=>quickAdd('lead')},
   {k:'link',icon:'link',label:'لينك',onClick:()=>quickAdd('link')},
   {k:'note',icon:'note',label:'ملاحظة',onClick:()=>quickAdd('note')},
 ]);
}
function pickCompany(cb){
 const cos=DB.companies.filter(c=>!c.archived);
 if(!cos.length)return toast('أضيفي برنامج الأول',false);
 if(App.view==='company'&&curCo())return cb(curCo());
 if(cos.length===1)return cb(cos[0]);
 modal({title:'اختاري البرنامج',build(b){b.innerHTML='';cos.forEach(c=>{const row=document.createElement('div');row.className='sb-item';row.style.margin='2px 0';
   row.innerHTML=`<div class="sb-logo" style="background:${c.color}">${/\p{Emoji}/u.test(c.logo)?c.logo:esc(initials(c.name))}</div><div class="sb-name">${esc(c.name)}</div>`;
   row.onclick=()=>{closeModal();cb(c);};b.appendChild(row);});},footer:[{label:'إلغاء',onClick:closeModal}]});
}
function quickAdd(kind){
 pickCompany(c=>{
   App.view='company';App.companyId=c.id;
   if(kind==='campaign'){const t=campaignTab(c)||c.tabs.find(t=>t.type==='table');if(!t)return;App.tabId=t.id;render();rowPanel(c,t,null);}
   else if(kind==='task'){const t=c.tabs.find(t=>t.type==='table'&&t.fields.some(f=>f.id==='priority'))||c.tabs.find(t=>t.type==='table');if(!t)return;App.tabId=t.id;render();rowPanel(c,t,null);}
   else if(kind==='lead'){const t=leadTab(c)||c.tabs.find(t=>t.type==='table');if(!t)return;App.tabId=t.id;render();rowPanel(c,t,null);}
   else if(kind==='link'){let t=c.tabs.find(t=>t.type==='links');if(!t){t={id:uid(),name:'اللينكات',type:'links',icon:'link',links:[]};c.tabs.push(t);}App.tabId=t.id;render();linkPanel(c,t,null);}
   else if(kind==='note'){let t=c.tabs.find(t=>t.type==='notes');if(!t){t={id:uid(),name:'ملاحظات',type:'notes',icon:'note',notes:[]};c.tabs.push(t);}App.tabId=t.id;render();notePanel(c,t,null);}
 });
}

/* ===== GLOBAL SEARCH ===== */
function globalSearch(q){
 closeGSearch();q=(q||'').trim().toLowerCase();if(!q)return;
 const res=[];
 DB.companies.filter(c=>!c.archived).forEach(c=>{
   if(c.name.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q)))res.push({type:'برنامج',co:c,label:c.name,sub:'فتح البرنامج',go:()=>openCompany(c.id)});
   c.tabs.forEach(t=>{
     (t.rows||[]).filter(r=>!r.archived).forEach(r=>{const hit=t.fields.some(f=>{const v=r.values[f.id];return v!=null&&String(Array.isArray(v)?v.join(' '):v).toLowerCase().includes(q);});
       if(hit){const nameField=t.fields[0];res.push({type:t.name,co:c,label:r.values[nameField.id]||'صف',sub:c.name,go:()=>{openCompany(c.id);App.tabId=t.id;render();rowPanel(c,t,r);}});}});
     (t.links||[]).filter(l=>!l.archived).forEach(l=>{if((l.title+l.url+(l.note||'')).toLowerCase().includes(q))res.push({type:'لينك',co:c,label:l.title,sub:c.name,go:()=>{openCompany(c.id);App.tabId=t.id;render();}});});
     (t.notes||[]).filter(n=>!n.archived).forEach(n=>{if(((n.title||'')+(n.body||'')).toLowerCase().includes(q))res.push({type:'ملاحظة',co:c,label:n.title||(n.body||'').slice(0,30),sub:c.name,go:()=>{openCompany(c.id);App.tabId=t.id;render();}});});
   });
 });
 const box=document.createElement('div');box.className='gsr';box.id='gsrBox';
 if(!res.length)box.innerHTML=`<div class="gsr-item" style="cursor:default"><div class="gsr-main"><div class="gsr-t" style="color:var(--muted)">مفيش نتائج لـ "${esc(q)}"</div></div></div>`;
 else{const groups={};res.slice(0,40).forEach(r=>{(groups[r.type]=groups[r.type]||[]).push(r);});
   box.innerHTML=Object.entries(groups).map(([g,items])=>`<div class="gsr-group-h">${esc(g)}</div>`+items.map((r)=>`<div class="gsr-item" data-gi="${res.indexOf(r)}"><div class="gsr-ico" style="background:${r.co.color}22;color:${r.co.color}">${svg('search')}</div><div class="gsr-main"><div class="gsr-t">${esc(r.label)}</div><div class="gsr-s">${esc(r.sub)}</div></div></div>`).join('')).join('');}
 const gs=$('.gsearch');gs.appendChild(box);
 box.querySelectorAll('[data-gi]').forEach(el=>el.onclick=()=>{const r=res[+el.dataset.gi];closeGSearch();$('#gSearch').value='';r.go();});
 setTimeout(()=>document.addEventListener('mousedown',gsOutside),0);
}
function gsOutside(e){if(!e.target.closest('.gsearch'))closeGSearch();}
function closeGSearch(){const b=$('#gsrBox');if(b)b.remove();document.removeEventListener('mousedown',gsOutside);}

function confirmDelete(title,sub,onYes){
 modal({title,sub,build(b){b.innerHTML='';},footer:[{label:'إلغاء',onClick:closeModal},{label:'حذف',danger:true,onClick:()=>{closeModal();onYes();}}]});
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>

<button id="themeToggle" style="position:fixed;inset-block-end:92px;inset-inline-end:28px;width:42px;height:42px;border-radius:50%;background:var(--surface);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:51;font-size:18px;cursor:pointer;transition:.2s;" title="تبديل المظهر">☀️</button>

<script>
(function(){
  const saved = localStorage.getItem('nawa_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  function updateBtn(){
    const t = document.documentElement.getAttribute('data-theme');
    const btn = document.getElementById('themeToggle');
    if(btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
  }
  document.addEventListener('DOMContentLoaded', function(){
    updateBtn();
    const btn = document.getElementById('themeToggle');
    if(btn) btn.addEventListener('click', function(){
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('nawa_theme', next);
      updateBtn();
    });
  });
})();
</script>
